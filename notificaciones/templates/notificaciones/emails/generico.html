<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:20px 0;background:#F8F4F0;font-family:Arial,Helvetica,sans-serif;">
<div style="max-width:600px;margin:0 auto;background:#fff;border:1px solid #DDD5CC;border-radius:4px;overflow:hidden;">
  <div style="background:#231A10;padding:24px 32px;">
    <h1 style="color:#fff;font-size:18px;margin:0;">{{ store_name|default:'Tu Tienda' }}</h1>
  </div>
  <div style="padding:28px 32px;">
    <h2 style="color:#231A10;font-size:16px;margin:0 0 12px;">{{ asunto }}</h2>
    {% if mensaje %}
    <p style="color:#555;font-size:14px;line-height:1.6;margin:0;">{{ mensaje }}</p>
    {% endif %}
  </div>
  <div style="background:#231A10;padding:16px 32px;text-align:center;">
    <p style="color:rgba(255,255,255,0.6);font-size:11px;margin:0;">© {{ store_name|default:'Tu Tienda' }}</p>
  </div>
</div>
</body>
</html>
