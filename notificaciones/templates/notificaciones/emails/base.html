<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:20px 0;background:#F8F4F0;font-family:Arial,Helvetica,sans-serif;">
<div style="max-width:600px;margin:0 auto;background:#fff;border:1px solid #DDD5CC;border-radius:4px;overflow:hidden;">

  <div style="background:{{ color_primario|default:'#B5441B' }};padding:24px 32px;text-align:center;">
    <h1 style="color:#fff;font-size:20px;margin:0;letter-spacing:2px;text-transform:uppercase;">{{ store_name|default:'Tu Tienda' }}</h1>
  </div>

  {% block contenido %}{% endblock %}

  <div style="background:#231A10;padding:16px 32px;text-align:center;margin-top:12px;">
    <p style="color:rgba(255,255,255,0.6);font-size:11px;margin:0;">© {{ store_name|default:'Tu Tienda' }}</p>
  </div>
</div>
</body>
</html>
